<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>Система контроля соблюдения ТБ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ТБ</div>
        <div>
          <p class="eyebrow">ИЦ ТМК / РусНИТИ</p>
          <h1>Система контроля соблюдения ТБ</h1>
        </div>
      </div>
      <div class="status-pill">
        <span class="status-dot"></span>
        Онлайн
      </div>
    </header>

    <main class="learning-shell" aria-live="polite">
      <section class="progress-card" aria-label="Прогресс прохождения">
        <div class="progress-meta">
          <span id="stepLabel">Шаг 1 из 7</span>
          <strong id="stepPercent">14%</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span id="progressFill"></span>
        </div>
      </section>

      <section class="screen-card" id="screenCard">
        <div class="screen-icon" id="screenIcon" aria-hidden="true">🛡️</div>
        <p class="eyebrow" id="screenKicker">Старт</p>
        <h2 id="screenTitle">Цифровой инструктаж по охране труда</h2>
        <p class="screen-text" id="screenText"></p>
        <div class="screen-list" id="screenList"></div>
        <div class="notice" id="screenNotice"></div>
      </section>

      <nav class="bottom-nav" aria-label="Навигация по обучению">
        <button class="secondary-button" id="prevBtn" type="button">Назад</button>
        <button class="primary-button" id="nextBtn" type="button">Далее</button>
      </nav>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
